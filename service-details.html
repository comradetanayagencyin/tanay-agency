<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details - Tanay Agency</title>
    <link rel="stylesheet" href="styles-light.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    <h1><a href="index.html">Tanay Agency</a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#services">Services</a></li>
                    <li><a href="index.html#portfolio">Our Work</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
                <div class="nav-right" style="display: flex; align-items: center; gap: 16px;">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                        <span class="theme-toggle-icon" id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="service-hero">
        <div class="container">
            <div class="service-hero-content">
                <div class="service-hero-icon" id="serviceHeroIcon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="service-hero-title" id="serviceHeroTitle">Service Name</h1>
                <p class="service-hero-subtitle" id="serviceHeroSubtitle">Professional service description goes here</p>
            </div>
        </div>
    </section>

    <!-- Service Details Content -->
    <section class="service-details-section">
        <div class="container">
            <!-- Back Button & Breadcrumb -->
            <div class="page-navigation">
                <button class="back-btn" id="backBtn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Services</span>
                </button>
                <div class="breadcrumb">
                    <a href="index.html">Home</a>
                    <i class="fas fa-chevron-right"></i>
                    <a href="index.html#services">Services</a>
                    <i class="fas fa-chevron-right"></i>
                    <span id="breadcrumbCurrent">Service Details</span>
                </div>
            </div>
            
            <div class="service-details-content" id="serviceDetails">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </section>

    <script src="details.js"></script>
</body>
</html>
