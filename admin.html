<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tanay Agency</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-rocket"></i> Tanay Agency</h2>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-section="services">
                    <i class="fas fa-cogs"></i>
                    <span>Services</span>
                </a>
                <a href="#" class="nav-item" data-section="projects">
                    <i class="fas fa-briefcase"></i>
                    <span>Projects</span>
                </a>
                <a href="#" class="nav-item" data-section="testimonials">
                    <i class="fas fa-star"></i>
                    <span>Testimonials</span>
                </a>
                <a href="#" class="nav-item" data-section="stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>Stats</span>
                </a>
                <a href="#" class="nav-item" data-section="messages">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="back-btn-admin" onclick="goToMainSite()">
                        <i class="fas fa-external-link-alt"></i>
                        <span>View Website</span>
                    </button>
                    <h1 id="pageTitle">Dashboard</h1>
                </div>
                <div class="top-bar-right" style="display: flex; align-items: center; gap: 16px;">
                    <button class="theme-toggle-admin" id="adminThemeToggle" aria-label="Toggle theme">
                        <i class="fas fa-sun" id="adminThemeIcon"></i>
                    </button>
                    <div class="user-info">
                        <span>Welcome, Admin</span>
                        <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard-section" class="content-section active">
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #8b5cf6, #06b6d4);">
                            <i class="fas fa-cogs"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalServices">0</h3>
                            <p>Services</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #06b6d4, #10b981);">
                            <i class="fas fa-briefcase"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalProjects">0</h3>
                            <p>Projects</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalTestimonials">0</h3>
                            <p>Testimonials</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalMessages">0</h3>
                            <p>Messages</p>
                        </div>
                    </div>
                </div>

                <div class="quick-actions">
                    <h2>Quick Actions</h2>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="showSection('services'); openServiceModal();">
                            <i class="fas fa-plus"></i>
                            <span>Add Service</span>
                        </button>
                        <button class="action-btn" onclick="showSection('projects'); openProjectModal();">
                            <i class="fas fa-plus"></i>
                            <span>Add Project</span>
                        </button>
                        <button class="action-btn" onclick="showSection('testimonials'); openTestimonialModal();">
                            <i class="fas fa-plus"></i>
                            <span>Add Testimonial</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Services Section -->
            <section id="services-section" class="content-section">
                <div class="section-header">
                    <h2>Manage Services</h2>
                    <button class="btn-primary" onclick="openServiceModal()">
                        <i class="fas fa-plus"></i> Add Service
                    </button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchServices" placeholder="Search services...">
                </div>
                <div id="servicesList" class="data-table"></div>
            </section>

            <!-- Projects Section -->
            <section id="projects-section" class="content-section">
                <div class="section-header">
                    <h2>Manage Projects</h2>
                    <button class="btn-primary" onclick="openProjectModal()">
                        <i class="fas fa-plus"></i> Add Project
                    </button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchProjects" placeholder="Search projects...">
                    <select id="filterCategory">
                        <option value="all">All Categories</option>
                        <option value="web">Web Applications</option>
                        <option value="ecommerce">E-commerce</option>
                        <option value="iot">IoT</option>
                        <option value="saas">SaaS</option>
                        <option value="mobile">Mobile Apps</option>
                        <option value="fintech">FinTech</option>
                    </select>
                </div>
                <div id="projectsList" class="data-table"></div>
            </section>

            <!-- Testimonials Section -->
            <section id="testimonials-section" class="content-section">
                <div class="section-header">
                    <h2>Manage Testimonials</h2>
                    <button class="btn-primary" onclick="openTestimonialModal()">
                        <i class="fas fa-plus"></i> Add Testimonial
                    </button>
                </div>
                <div id="testimonialsList" class="data-table"></div>
            </section>

            <!-- Stats Section -->
            <section id="stats-section" class="content-section">
                <div class="section-header">
                    <h2>Manage Statistics</h2>
                </div>
                <form id="statsForm" class="stats-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Projects Count</label>
                            <input type="number" id="statProjects" required>
                        </div>
                        <div class="form-group">
                            <label>Clients Count</label>
                            <input type="number" id="statClients" required>
                        </div>
                        <div class="form-group">
                            <label>Years of Experience</label>
                            <input type="number" id="statExperience" required>
                        </div>
                        <div class="form-group">
                            <label>Team Members</label>
                            <input type="number" id="statTeam" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Save Statistics
                    </button>
                </form>
            </section>

            <!-- Messages Section -->
            <section id="messages-section" class="content-section">
                <div class="section-header">
                    <h2>Contact Messages</h2>
                </div>
                <div id="messagesList" class="messages-list"></div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add Item</h2>
            <form id="modalForm"></form>
        </div>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert"></div>

    <script src="admin.js"></script>
</body>
</html>
